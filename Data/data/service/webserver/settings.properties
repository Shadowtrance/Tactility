# Web Server Settings
# WiFi and HTTP server configuration

# WiFi Enable (0=disabled, 1=enabled)
wifiEnabled=0

# WiFi Mode (0=Station/Client, 1=Access Point)
wifiMode=1

# Station Mode Settings (connect to existing WiFi)
stationSsid=YourWiFiSSID
stationPassword=YourWiFiPassword

# Access Point Mode Settings (create own WiFi network)
# apSsid will be auto-generated as Tactility-XXXX if empty
apSsid=Tactility-XXXX
apPassword=tactility
apChannel=1

# Web Server Settings
webServerEnabled=0
webServerPort=80

# HTTP Basic Authentication (optional)
webServerAuthEnabled=1
webServerUsername=admin
webServerPassword=admin
